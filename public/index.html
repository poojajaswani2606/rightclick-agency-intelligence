<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Right Click Projects - Agency Intelligence</title>
  <style>
    :root {
      --bg: #f4f5fb;
      --card: #ffffff;
      --ink: #14152b;
      --muted: #68708a;
      --line: #e7e8f2;
      --purple: #5146dc;
      --purple-soft: #f5f3ff;
      --green: #47b987;
      --green-soft: #eefaf4;
      --amber: #eba63a;
      --amber-soft: #fff8e9;
      --coral: #ff6b61;
      --navy: #142f45;
      --shadow: 0 3px 12px rgba(20, 21, 43, .05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
      letter-spacing: 0;
    }
    a { color: var(--purple); font-weight: 800; text-decoration-thickness: 1px; text-underline-offset: 3px; }
    button { font: inherit; letter-spacing: 0; }
    .app { display: grid; grid-template-columns: 252px minmax(0, 1fr); min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px 14px;
      background: #fff;
      border-right: 1px solid var(--line);
    }
    .brand { padding: 0 6px 18px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
    .brand strong { display: block; font-size: 15px; line-height: 1.2; }
    .brand span { display: block; margin-top: 7px; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; }
    .nav-label { margin: 20px 7px 8px; color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
    .nav {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 8px;
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      text-align: left;
      cursor: pointer;
      font-weight: 650;
    }
    .nav:hover { background: #f7f7fd; }
    .nav.active { background: var(--purple); color: #fff; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #a5adbf; }
    .dot.live { background: var(--green); }
    .dot.warn { background: var(--amber); }
    .nav small { color: inherit; opacity: .72; font-size: 11px; }
    main { min-width: 0; padding: 28px 36px 54px; }
    .page { max-width: 1180px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; gap: 18px; align-items: flex-start; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
    h1, h2, h3 { margin: 0; line-height: 1.15; letter-spacing: 0; }
    h1 { font-size: 28px; }
    h2 { font-size: 18px; }
    h3 { font-size: 14px; }
    .sub { margin: 7px 0 0; color: var(--muted); line-height: 1.45; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn, .link-btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 11px;
      min-height: 36px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn.primary, .link-btn.primary { background: var(--purple); border-color: var(--purple); color: white; }
    .btn:hover, .link-btn:hover { border-color: #cfd2e8; background: #fbfbff; }
    .btn.primary:hover, .link-btn.primary:hover { background: #4237c8; color: white; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      background: var(--purple-soft);
      color: var(--purple);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .pill.green { background: var(--green-soft); color: #177a52; }
    .pill.amber { background: var(--amber-soft); color: #9b6408; }
    .pill.dark { background: var(--navy); color: white; }
    .months { display: flex; gap: 10px; margin: 24px 0 14px; border-bottom: 1px solid var(--line); }
    .months button { border: 0; background: transparent; padding: 0 10px 12px; color: var(--muted); font-weight: 850; cursor: pointer; border-bottom: 3px solid transparent; }
    .months button.active { color: var(--purple); border-bottom-color: var(--purple); }
    .progress { height: 6px; border-radius: 999px; background: #e7e8f2; overflow: hidden; margin: 8px 0 28px; }
    .progress span { display: block; height: 100%; background: var(--amber); border-radius: inherit; }
    .progress-label { display: flex; justify-content: flex-end; color: var(--muted); font-size: 12px; margin-top: -20px; margin-bottom: 22px; }
    .section-title { margin: 24px 0 14px; padding-left: 13px; border-left: 4px solid var(--purple); }
    .grid { display: grid; gap: 14px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .grid-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    .card, .kpi {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 13px;
      box-shadow: var(--shadow);
    }
    .card { padding: 18px; margin-bottom: 18px; }
    .kpi { padding: 14px 15px; min-height: 108px; border-top: 3px solid var(--purple); }
    .kpi.green { border-top-color: var(--green); }
    .kpi.amber { border-top-color: var(--amber); }
    .kpi.coral { border-top-color: var(--coral); }
    .label { color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: .09em; }
    .value { margin-top: 12px; font-size: 28px; font-weight: 950; color: var(--purple); overflow-wrap: anywhere; }
    .kpi.green .value { color: var(--green); }
    .kpi.amber .value { color: var(--amber); }
    .kpi.coral .value { color: var(--coral); }
    .delta { color: var(--muted); font-size: 12px; margin-top: 7px; line-height: 1.35; }
    .standout {
      margin: 8px 0 24px;
      background: linear-gradient(120deg, #241c67, #342f86);
      color: white;
      border-radius: 13px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
    }
    .standout strong { display: block; font-size: 17px; line-height: 1.35; margin: 12px 0; }
    .standout .muted { color: #d8d8ff; font-weight: 650; }
    .table-card { padding: 0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: middle; }
    th { color: var(--muted); font-size: 10.5px; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; background: #fbfbff; }
    tr:last-child td { border-bottom: 0; }
    .featured-row { background: #faf5ff; }
    .post-title { font-weight: 850; line-height: 1.35; }
    .bar-metric { display: flex; align-items: center; gap: 8px; font-weight: 900; }
    .mini-bar { height: 6px; width: 76px; background: #edf0f7; border-radius: 999px; overflow: hidden; }
    .mini-bar span { display: block; height: 100%; background: var(--purple); border-radius: inherit; }
    .analysis-panel { border-top: 3px solid var(--green); }
    .analysis-panel.amber { border-top-color: var(--amber); }
    .analysis-item { padding: 14px 0; border-bottom: 1px solid var(--line); line-height: 1.48; color: #33384f; }
    .analysis-item:last-child { border-bottom: 0; padding-bottom: 0; }
    .analysis-item strong { display: block; margin-bottom: 6px; color: var(--ink); text-transform: uppercase; font-size: 11px; letter-spacing: .08em; }
    .glance-box { background: #f0f0ff; border-radius: 8px; padding: 15px 17px; line-height: 1.55; margin-bottom: 16px; }
    .role-row, .client-row { display: grid; align-items: center; gap: 12px; border-bottom: 1px solid var(--line); padding: 11px 0; }
    .role-row { grid-template-columns: 180px minmax(0, 1fr) 42px; }
    .client-row { grid-template-columns: minmax(150px, 1fr) 130px 90px 120px 96px; cursor: pointer; }
    .client-row:last-child, .role-row:last-child { border-bottom: 0; }
    .bar { height: 8px; border-radius: 999px; background: #edf0f7; overflow: hidden; }
    .bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--purple), #877cff); border-radius: inherit; }
    .insight-card { min-height: 156px; line-height: 1.5; }
    .insight-card strong { display: block; margin-bottom: 9px; font-size: 15px; }
    .viewer-card { display: grid; grid-template-columns: 42px minmax(0, 1fr); gap: 13px; line-height: 1.45; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--purple-soft); color: var(--purple); display: grid; place-items: center; font-weight: 950; }
    .viewer-card .name { font-weight: 900; }
    .note { border: 1px dashed #cfd3e7; background: #fbfbff; border-radius: 8px; padding: 13px; color: var(--muted); line-height: 1.45; margin-top: 12px; }
    .report-hub { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .tracker-card { padding: 0; overflow: hidden; }
    .tracker-head { padding: 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
    .tracker-grid { display: grid; grid-template-columns: 150px repeat(6, minmax(82px, 1fr)) 92px; overflow-x: auto; }
    .tracker-cell { min-height: 58px; padding: 12px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); background: #fff; }
    .tracker-cell:nth-child(8n) { border-right: 0; }
    .tracker-label { background: #fbfbff; font-weight: 900; color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: .08em; }
    .week-label strong { display: block; color: var(--ink); font-size: 14px; margin-bottom: 3px; }
    .day-box { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 750; color: var(--ink); }
    .day-box span { display: grid; gap: 2px; }
    .day-box small { color: var(--muted); font-size: 11px; font-weight: 800; }
    .day-box input { width: 18px; height: 18px; accent-color: var(--purple); }
    .tracker-cell.muted-cell { background: #fafbff; color: #a3a8bb; }
    .sync-label { margin-top: 8px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .target-pill { display: inline-flex; justify-content: center; min-width: 58px; border-radius: 999px; padding: 5px 8px; background: var(--purple-soft); color: var(--purple); font-weight: 950; }
    .tracker-summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin: 18px 0; }
    .hidden { display: none; }
    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; }
      .grid-5, .grid-6 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid-4, .grid-3, .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tracker-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .client-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 720px) {
      main { padding: 18px; }
      .topbar { display: block; }
      .toolbar { justify-content: flex-start; margin-top: 14px; }
      .grid-2, .grid-3, .grid-4, .grid-5, .grid-6 { grid-template-columns: 1fr; }
      .tracker-summary { grid-template-columns: 1fr; }
      .role-row, .client-row { grid-template-columns: 1fr; }
      th, td { padding: 10px 9px; }
    }
  </style>
</head>

          ${kpi("Tier 1 - ICP buyers", "40", "VPs, Directors, Founders", "green")}
          ${kpi("Tier 2 - Champions", "7", "Senior practitioners", "amber")}
          ${kpi("Tier 3 - Ecosystem", "2", "Peers and amplifiers")}
          ${kpi("Anonymous", "200", "of 257 total")}
        </div>

        <section class="card">
          <h2>Jose, Here's What's Actually Happening</h2>
          ${[
            ["200 anonymous", "Senior people are hiding. That is good, not bad. Many buyers browse quietly before they engage."],
            ["3 PE/VC investors", "They do not browse randomly. They search with intent and can carry Jose into portfolio-company conversations."],
            ["8 founders", "Including Mirek's DM intent. Relationships are starting, not just reach."],
            ["14 RevOps leaders", "Jose's tribe is becoming an informal amplifier network."],
            ["8 GTM Strategy leaders", "Connectors are carrying Jose's name into rooms he has not entered yet."]
          ].map(i=>`<div class="analysis-item"><strong>${i[0]}</strong>${i[1]}</div>`).join("")}
        </section>

        <section class="card"><h2>Who Is Watching - By Role</h2>${viewerRoles.map(r=>`<div class="role-row"><strong>${r[0]}</strong><div class="bar"><span style="width:${Math.max(8, r[1] * 7)}%"></span></div><strong>${r[1]}</strong></div>`).join("")}</section>

        <div class="section-title"><h2>Strategic Insights - Audience</h2></div>
        <div class="grid grid-2">${audienceInsights.map(i=>`<section class="card insight-card"><strong>${i[0]}</strong>${i[1]}</section>`).join("")}</div>

        <div class="section-title"><h2>Tier 1 - Direct ICP</h2></div>
        <div class="grid grid-2">${tier1Viewers.map(v=>`<section class="card viewer-card"><div class="avatar">${v[0]}</div><div><div class="name">${v[1]}</div><div class="delta">${v[2]}</div><p><span class="pill">${v[3]}</span></p><p>${v[4]}</p></div></section>`).join("")}</div>

        <section class="card table-card"><table><thead><tr><th>Name</th><th>Title</th><th>Category</th></tr></thead><tbody>${tier2Rows.map(r=>`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td><span class="pill amber">${r[2]}</span></td></tr>`).join("")}</tbody></table></section>
      `;
    }

    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => {
        setActive(button);
        show(button.dataset.view);
        history.replaceState(null, "", "#" + button.dataset.view);
      });
    });
    document.querySelectorAll("[data-client]").forEach(button => {
      button.addEventListener("click", () => openClient(button.dataset.client));
    });

    const trackerHashMonth = (location.hash.match(/tracker-(2026-\d{2})/) || [])[1];
    if (trackerHashMonth && trackerMonths.some(month => month.id === trackerHashMonth)) {
      activeTrackerMonth = trackerHashMonth;
    }

    renderAgency();
    renderCollector();
    renderTracker();
    loadTrackerState();

    if (location.hash.includes("jose")) {
      openClient("jose");
    } else if (location.hash.includes("tracker") || location.hash.includes("intake")) {
      show("tracker");
      setActive(document.querySelector(`[data-view="tracker"]`));
    } else {
      show("agency");
    }
  </script>
</body>
</html>
